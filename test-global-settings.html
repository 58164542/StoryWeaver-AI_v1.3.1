<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全局设置测试工具</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: #1a1a1a;
            color: #fff;
        }
        .container {
            background: #2a2a2a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        h1 {
            color: #4ade80;
            border-bottom: 2px solid #4ade80;
            padding-bottom: 10px;
        }
        h2 {
            color: #60a5fa;
            margin-top: 0;
        }
        button {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin: 5px;
            transition: all 0.2s;
        }
        button:hover {
            background: #22c55e;
            transform: translateY(-2px);
        }
        button.danger {
            background: #ef4444;
            color: #fff;
        }
        button.danger:hover {
            background: #dc2626;
        }
        button.secondary {
            background: #6b7280;
            color: #fff;
        }
        button.secondary:hover {
            background: #4b5563;
        }
        .log {
            background: #000;
            border: 1px solid #4ade80;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            max-height: 400px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #4ade80;
            padding-left: 10px;
        }
        .log-entry.success { border-left-color: #4ade80; color: #4ade80; }
        .log-entry.error { border-left-color: #ef4444; color: #ef4444; }
        .log-entry.warning { border-left-color: #f59e0b; color: #f59e0b; }
        .log-entry.info { border-left-color: #60a5fa; color: #60a5fa; }
        .data-display {
            background: #1a1a1a;
            border: 1px solid #4b5563;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .status {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            margin-left: 10px;
        }
        .status.pass { background: #4ade80; color: #000; }
        .status.fail { background: #ef4444; color: #fff; }
        .test-result {
            margin: 10px 0;
            padding: 10px;
            border-radius: 6px;
            background: #1a1a1a;
        }
    </style>
</head>
<body>
    <h1>🧪 StoryWeaver AI - 全局设置测试工具</h1>

    <div class="container">
        <h2>📋 测试步骤</h2>
        <button onclick="runTest1()">测试1: 清空并重新加载</button>
        <button onclick="runTest2()">测试2: 修改并保存设置</button>
        <button onclick="runTest3()">测试3: 验证持久化</button>
        <button onclick="runAllTests()">🚀 运行全部测试</button>
        <button class="danger" onclick="clearAll()">🗑️ 清空所有数据</button>
    </div>

    <div class="container">
        <h2>📊 当前 localStorage 数据</h2>
        <button class="secondary" onclick="displayCurrentData()">刷新显示</button>
        <button class="secondary" onclick="exportData()">导出数据</button>
        <div id="currentData" class="data-display">点击"刷新显示"查看数据</div>
    </div>

    <div class="container">
        <h2>📝 测试日志</h2>
        <button class="secondary" onclick="clearLog()">清空日志</button>
        <div id="log" class="log"></div>
    </div>

    <div class="container">
        <h2>✅ 测试结果</h2>
        <div id="testResults"></div>
    </div>

    <script>
        let testResults = [];

        function log(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
            log('日志已清空', 'info');
        }

        function displayCurrentData() {
            const data = localStorage.getItem('sw_global_settings');
            const dataDiv = document.getElementById('currentData');

            if (data) {
                try {
                    const parsed = JSON.parse(data);
                    dataDiv.textContent = JSON.stringify(parsed, null, 2);
                    log('✅ 成功读取 localStorage 数据', 'success');
                } catch (e) {
                    dataDiv.textContent = '❌ 数据解析失败: ' + e.message;
                    log('❌ 数据解析失败: ' + e.message, 'error');
                }
            } else {
                dataDiv.textContent = '⚠️ localStorage 中没有 sw_global_settings 数据';
                log('⚠️ localStorage 中没有数据', 'warning');
            }
        }

        function exportData() {
            const data = localStorage.getItem('sw_global_settings');
            if (data) {
                const blob = new Blob([data], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'global-settings-backup.json';
                a.click();
                log('✅ 数据已导出', 'success');
            } else {
                log('❌ 没有数据可导出', 'error');
            }
        }

        function clearAll() {
            if (confirm('确定要清空所有数据吗？此操作不可恢复！')) {
                localStorage.clear();
                log('🗑️ 所有 localStorage 数据已清空', 'warning');
                displayCurrentData();
            }
        }

        function addTestResult(testName, passed, message) {
            testResults.push({ testName, passed, message });
            const resultsDiv = document.getElementById('testResults');
            const resultDiv = document.createElement('div');
            resultDiv.className = 'test-result';
            resultDiv.innerHTML = `
                <strong>${testName}</strong>
                <span class="status ${passed ? 'pass' : 'fail'}">${passed ? '✅ 通过' : '❌ 失败'}</span>
                <div style="margin-top: 5px; color: #9ca3af;">${message}</div>
            `;
            resultsDiv.appendChild(resultDiv);
        }

        function runTest1() {
            log('🧪 开始测试1: 清空并重新加载', 'info');

            // 清空数据
            localStorage.removeItem('sw_global_settings');
            log('1. 已清空 sw_global_settings', 'info');

            // 检查是否真的清空了
            const data = localStorage.getItem('sw_global_settings');
            if (data === null) {
                log('✅ 验证通过：数据已清空', 'success');
                addTestResult('测试1: 清空数据', true, '成功清空 localStorage 中的全局设置');
            } else {
                log('❌ 验证失败：数据未清空', 'error');
                addTestResult('测试1: 清空数据', false, '数据清空失败');
            }

            displayCurrentData();
            log('2. 请刷新主应用页面，观察控制台是否输出: "ℹ️ 未找到已保存的全局设置，使用默认设置"', 'warning');
        }

        function runTest2() {
            log('🧪 开始测试2: 修改并保存设置', 'info');

            // 模拟保存修改后的设置
            const testSettings = {
                extractionModel: 'test-model',
                projectTypePrompts: {
                    'REAL_PERSON_COMMENTARY': {
                        storyboardImagePrefix: '测试前缀',
                        videoGenerationPrefix: '测试视频前缀',
                        characterExtraction: '测试角色提取',
                        sceneExtraction: '测试场景提取',
                        storyboardBreakdown: '测试分镜拆解 - 这是修改后的内容'
                    }
                }
            };

            localStorage.setItem('sw_global_settings', JSON.stringify(testSettings));
            log('1. 已保存测试数据到 localStorage', 'success');

            // 验证保存
            const saved = localStorage.getItem('sw_global_settings');
            if (saved) {
                const parsed = JSON.parse(saved);
                if (parsed.projectTypePrompts.REAL_PERSON_COMMENTARY.storyboardBreakdown === '测试分镜拆解 - 这是修改后的内容') {
                    log('✅ 验证通过：数据已正确保存', 'success');
                    addTestResult('测试2: 保存设置', true, '成功保存修改后的设置到 localStorage');
                } else {
                    log('❌ 验证失败：保存的数据不正确', 'error');
                    addTestResult('测试2: 保存设置', false, '保存的数据与预期不符');
                }
            } else {
                log('❌ 验证失败：数据未保存', 'error');
                addTestResult('测试2: 保存设置', false, '数据保存失败');
            }

            displayCurrentData();
            log('2. 请刷新主应用页面，打开全局设置，检查是否显示修改后的内容', 'warning');
        }

        function runTest3() {
            log('🧪 开始测试3: 验证持久化', 'info');

            const data = localStorage.getItem('sw_global_settings');
            if (!data) {
                log('❌ 测试失败：没有找到保存的数据', 'error');
                addTestResult('测试3: 验证持久化', false, '请先运行测试2');
                return;
            }

            try {
                const parsed = JSON.parse(data);
                log('1. 成功读取 localStorage 数据', 'success');

                // 检查关键字段
                const checks = [
                    { field: 'extractionModel', expected: 'test-model' },
                    { field: 'storyboardBreakdown', expected: '测试分镜拆解 - 这是修改后的内容' }
                ];

                let allPassed = true;
                checks.forEach(check => {
                    let value;
                    if (check.field === 'storyboardBreakdown') {
                        value = parsed.projectTypePrompts.REAL_PERSON_COMMENTARY.storyboardBreakdown;
                    } else {
                        value = parsed[check.field];
                    }

                    if (value === check.expected) {
                        log(`✅ ${check.field}: 验证通过`, 'success');
                    } else {
                        log(`❌ ${check.field}: 验证失败 (期望: ${check.expected}, 实际: ${value})`, 'error');
                        allPassed = false;
                    }
                });

                if (allPassed) {
                    addTestResult('测试3: 验证持久化', true, '所有字段验证通过，数据持久化正常');
                } else {
                    addTestResult('测试3: 验证持久化', false, '部分字段验证失败');
                }

            } catch (e) {
                log('❌ 数据解析失败: ' + e.message, 'error');
                addTestResult('测试3: 验证持久化', false, '数据解析错误: ' + e.message);
            }

            displayCurrentData();
        }

        function runAllTests() {
            testResults = [];
            document.getElementById('testResults').innerHTML = '';
            clearLog();

            log('🚀 开始运行全部测试...', 'info');
            log('', 'info');

            runTest1();
            log('', 'info');

            setTimeout(() => {
                runTest2();
                log('', 'info');

                setTimeout(() => {
                    runTest3();
                    log('', 'info');
                    log('✅ 所有测试完成！', 'success');

                    const passed = testResults.filter(r => r.passed).length;
                    const total = testResults.length;
                    log(`📊 测试结果: ${passed}/${total} 通过`, passed === total ? 'success' : 'warning');
                }, 500);
            }, 500);
        }

        // 页面加载时显示当前数据
        window.onload = function() {
            log('🎉 测试工具已加载', 'success');
            displayCurrentData();
        };
    </script>
</body>
</html>
